name: Playwright E2E

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          npm ci

      - name: Install Playwright browsers
        run: |
          npx playwright install --with-deps

      - name: Build app
        run: |
          npm run build

      - name: Start server
        run: |
          nohup npm run start &> server.log &
          # wait for server to respond
          for i in {1..30}; do
            code=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000 || true)
            if [ "$code" = "200" ]; then
              echo "server up"; break
            fi
            sleep 2
          done

      - name: Run E2E script
        env:
          CI: true
        run: |
          node scripts/demo-e2e.mjs
