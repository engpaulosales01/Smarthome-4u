adjacency_rules:
  -
    rule_id: "kitchen_to_dining"
    space_a: "kitchen"
    space_b: "dining"
    relationship: "required_direct"
    weight: 1.0
  -
    rule_id: "kitchen_to_pantry"
    space_a: "kitchen"
    space_b: "pantry"
    relationship: "required_direct"
    weight: 1.0
  -
    rule_id: "living_to_dining"
    space_a: "living_main"
    space_b: "dining"
    relationship: "required_direct"
    weight: 1.0
