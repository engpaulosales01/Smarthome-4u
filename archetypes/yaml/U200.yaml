    rule_id: "office_near_entry"
    space_a: "office"
    space_b: "entry"
    relationship: "preferred_near"
    weight: 0.7
  -
    rule_id: "bedrooms_to_shared_bath"
    space_a: "bedroom_secondary"
    space_b: "bathroom_shared"
    relationship: "preferred_near"
    weight: 0.8
  -
    rule_id: "laundry_to_service"
    space_a: "laundry"
    space_b: "garage"
    relationship: "preferred_near"
    weight: 0.7
zoning_rules:
  public_zone:
    - "entry"
    - "foyer"
    - "living_main"
    - "living_secondary"
    - "dining"
    - "kitchen"
    - "powder"
    - "office"
  private_zone:
    - "bedroom_master"
    - "bedroom_secondary"
    - "bedroom_guest"
    - "walk_in_closet"
    - "ensuite"
    - "bathroom_shared"
  service_zone:
    - "pantry"
    - "laundry"
    - "storage"
    - "garage"
    - "mudroom"
    - "linen"
  outdoor_zone:
    - "alfresco"
    - "balcony"
    - "outdoor_kitchen"
  circulation_zone:
    - "hallway"
    - "staircase"
    - "gallery"
  privacy_gradient:
    entry_to_public: "direct"
    public_to_private: "buffered"
    garage_to_service: "direct"
    private_to_outdoor: "controlled"
massing_rules:
  primary_volume_count:
    min: 1
    max: 3
  secondary_volume_count:
    min: 0
    max: 2
  footprint_complexity_score_max: 0.28
  preferred_composition: "stacked_orthogonal_volumes"
  horizontal_plane_emphasis: true
  roof_language: "flat_low_pitch_hidden"
  cantilever_max_m: 2.4
  double_height_space_allowed: true
  balcony_strategy: "integrated_linear"
  entry_expression: "recessed_protected"
  avoid_fragmented_massing: true
  avoid_excessive_angularity: true
facade_rules:
  glazing_ratio_front:
    - 0.25
    - 0.45
  glazing_ratio_rear:
    - 0.4
    - 0.7
  corner_glazing_allowed: true
  window_alignment_required: true
  window_rhythm: "calm_ordered"
  primary_material_palette:
    - "smooth_light_render"
    - "dark_aluminium_frame"
    - "timber_accent"
    - "stone_accent_optional"
  material_count_max: 4
  feature_frame_allowed: true
  ornamentation_allowed: false
  parapet_strategy: "clean_continuous"
  lighting_language: "integrated_warm_linear"
structural_rules:
  preferred_grid_mm: 600
  preferred_span_ranges_m:
    living:
      - 4.5
      - 7.5
    bedrooms:
      - 3.0
      - 4.2
    garage:
      - 5.5
      - 6.5
  max_unresolved_span_m: 8.0
  load_path_continuity_required: true
  stacked_load_bearing_alignment_preferred: true
  opening_density_limit_per_wall: 0.65
lsf_rules:
  panelization_required: true
  panel_width_preference_mm:
    - 600
    - 1200
  repetition_priority: "high"
  wet_wall_alignment_required: true
  service_core_compactness_priority: "high"
  stair_geometry_standardized: true
  avoid_irregular_wall_angles: true
  avoid_small_nonstandard_panels: true
  facade_offsets_limit: 3
  balcony_connection_types:
    - "standard_type_a"
    - "standard_type_b"
mep_rules:
  wet_areas_stacked_preferred: true
  wet_core_consolidation_priority: "high"
  max_distance_kitchen_to_waste_stack_m: 6.0
  laundry_near_service_wall_preferred: true
  plant_space_required: false
  hvac_zone_strategy: "simple_dual_zone"
  solar_ready_roof_preferred: true
  ev_charger_ready: true
variant_rules:
  allowed_variants:
    - "mirror"
    - "facade_pack_a"
    - "facade_pack_b"
    - "guest_suite_upgrade"
    - "narrow_lot_adaptation"
  non_negotiable_elements:
    - "kitchen_dining_living_relationship"
    - "master_privacy_logic"
    - "window_alignment"
    - "primary_massing_language"
  max_variation_distance_score: 0.2
scoring_profile:
  weights:
    brand_fit: 0.2
    plan_efficiency: 0.15
    customer_fit: 0.15
    fabrication_simplicity: 0.15
    cost_fit: 0.1
    daylight_quality: 0.08
    privacy_quality: 0.06
    circulation_quality: 0.05
    resale_appeal: 0.04
    permitting_simplicity: 0.02
  minimum_thresholds:
    brand_fit: 0.85
    plan_efficiency: 0.75
    fabrication_simplicity: 0.8
output_templates:
  required_outputs:
    - "structured_brief"
    - "room_schedule"
    - "adjacency_graph"
    - "2d_floor_plan"
    - "massing_model"
    - "facade_views"
    - "render_front"
    - "render_rear"
    - "render_lateral"
    - "gross_net_area_schedule"
    - "lsf_readiness_score"
  optional_outputs:
    - "ifc_export"
    - "quantity_takeoff"
    - "solar_readiness_summary"
    - "cost_estimate_band"
metadata:
  owner: "SmartHome-4U"
  created: "2026-03-08"
  notes: "Urban narrow-lot double-storey archetype with stacked services."
